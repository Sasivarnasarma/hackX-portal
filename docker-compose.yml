version: '3.8'

services:
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: hackx-backend
    restart: always
    ports:
      - "5272:8000"
    env_file:
      - ./backend/.env
    volumes:
      - ./backend/hackx.db:/app/hackx.db
      - ./backend/log.log:/app/log.log

  frontend-user:
    build:
      context: ./frontend-user
      dockerfile: Dockerfile
    container_name: hackx-frontend-user
    restart: always
    ports:
      - "5273:80"
    depends_on:
      - backend
