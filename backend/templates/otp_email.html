<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Email Verification - HackX</title>
</head>
<body style="margin: 0; padding: 0; background-color: #010814; font-family: 'TT Hoves Pro', -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif; color: #f0f4ff;">
    <table role="presentation" width="100%" cellspacing="0" cellpadding="0" style="background-color: #010814; padding: 40px 0;">
        <tr>
            <td align="center">
                <table role="presentation" width="550" style="background-color: #020B1E; border: 1px solid rgba(91, 184, 255, 0.2); border-radius: 16px; box-shadow: 0 12px 40px rgba(1, 0, 20, 0.8); padding: 40px;">
                    <tr>
                        <td align="center" style="padding-bottom: 25px;">
                            <h1 style="margin: 0; font-size: 30px; font-weight: 800; letter-spacing: 3px; color: #5BB8FF; text-transform: uppercase; font-family: 'TT Hoves Pro', 'Segoe UI', sans-serif;">HACKX 2026</h1>
                        </td>
                    </tr>
                    <tr>
                        <td style="padding-bottom: 20px;">
                            <h2 style="margin: 0; font-size: 18px; font-weight: 700; color: #f0f4ff; border-bottom: 1px solid rgba(91, 184, 255, 0.15); padding-bottom: 12px; letter-spacing: 0.05em; text-transform: uppercase;">{{heading}}</h2>
                        </td>
                    </tr>
                    <tr>
                        <td style="padding-bottom: 30px; font-size: 14px; line-height: 1.6; color: #8ba3c7;">
                            {{description}}
                        </td>
                    </tr>
                    <tr>
                        <td align="center" style="padding: 10px 0 25px 0;">
                            <table role="presentation" cellspacing="0" cellpadding="0">
                                <tr>
                                    <td align="center" style="background-color: #010814; border: 1px dashed rgba(91, 184, 255, 0.45); border-radius: 12px; padding: 18px 40px;">
                                        <span style="font-family: 'Courier New', Courier, monospace; font-size: 36px; font-weight: bold; letter-spacing: 6px; color: #5BB8FF;">{{OTP_CODE}}</span>
                                    </td>
                                </tr>
                            </table>
                        </td>
                    </tr>
                    <tr>
                        <td style="font-size: 11px; line-height: 1.5; color: rgba(139, 163, 199, 0.5); border-top: 1px solid rgba(91, 184, 255, 0.1); padding-top: 20px; text-align: center;">
                            If you did not initiate this request, you can safely ignore this email. Please do not share this verification code with anyone.<br>
                            &copy; 2026 HackX Coordinating Committee. All Rights Reserved.
                        </td>
                    </tr>
                </table>
            </td>
        </tr>
    </table>
</body>
</html>
